version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:10"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      rust-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/plugins/gmail"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:20"
      timezone: "UTC"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
    groups:
      gmail-plugin-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/plugins/stagehand"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:30"
      timezone: "UTC"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
    groups:
      stagehand-plugin-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/scripts/odin"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:40"
      timezone: "UTC"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
    groups:
      python-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:50"
      timezone: "UTC"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
    groups:
      docker-dependencies:
        patterns:
          - "*"
